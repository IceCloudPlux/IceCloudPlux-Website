<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IceCloud & Plux · 赞助我们</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e9eef3 100%);
            color: #2d3748;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #3182ce;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }

        .page-hero {
            text-align: center;
            margin-bottom: 3rem;
        }
        .page-hero h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #dd6b20, #ed8936);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        .page-hero .subtitle {
            color: #5a6c7d;
            font-size: 1rem;
        }

        /* 二维码区域 */
        .qr-section {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            text-align: center;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .qr-section h3 {
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 1rem;
        }
        .qr-section p {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .qr-placeholder {
            width: 220px;
            height: 220px;
            background: #f7fafc;
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: #a0aec0;
            font-size: 0.85rem;
        }
        .qr-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }
        .qr-note {
            font-size: 0.8rem;
            color: #a0aec0;
            margin-top: 0.5rem;
        }

        /* 赞助者名单 */
        .sponsor-list-section {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.04);
        }
        .sponsor-list-section h3 {
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #1a202c;
            text-align: center;
        }
        .sponsor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 0.8rem;
            text-align: center;
        }
        .sponsor-item {
            padding: 0.8rem;
            background: #f7fafc;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #2d3748;
        }
        .empty-sponsor {
            text-align: center;
            color: #a0aec0;
            padding: 2rem;
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            background: white;
            border-top: 1px solid #edf2f7;
            color: #a0aec0;
            font-size: 0.85rem;
            margin-top: 3rem;
        }
        footer a {
            color: #4a5568;
            font-weight: 600;
            text-decoration: none;
        }
        footer a:hover { color: #3182ce; }

        @media (max-width: 650px) {
            .page-hero h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <main class="container">
        <a href="index" class="back-link">← 返回首页</a>

        <section class="page-hero">
            <h1>❤️ 赞助我们</h1>
            <p class="subtitle">您的每一份支持都是我们持续开发与维护的动力</p>
        </section>

        <!-- 收款二维码 -->
        <div class="qr-section">
            <h3>📱 扫码赞助</h3>
            <p>请使用微信扫描下方二维码，金额随意，感谢您的支持！</p>
            <!-- 请将下方 src 替换为你的收款二维码图片地址 -->
            <div class="qr-placeholder" id="qrContainer">
                <img src="images/qr-code.png" alt="收款码">
            </div>
            <p class="qr-note">赞助时请备注您的 Minecraft 用户名，以便我们记录</p>
        </div>

        <!-- 赞助者名单 -->
        <div class="sponsor-list-section">
            <h3>🏆 赞助者名单</h3>
            <div class="sponsor-grid" id="sponsorList">
                <div class="empty-sponsor">暂无赞助者，快来成为第一位支持者吧！</div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 IceCloud & Plux Dev · 本网站与 Mojang 或 Microsoft 无关。</p>
        <p style="margin-top: 0.5rem;">
            <a href="index">返回首页</a> · 
            <a href="https://github.com/IceCloudPlux/IceCloudPlux.github.io">GitHub</a>
        </p>
    </footer>

    <script>
        (function() {
            // ==================== 赞助者名单（请修改为真实数据） ====================
            const sponsors = [
                // 格式：'赞助者名字'
                // '玩家A',
                // '玩家B',
                // '玩家C',
            ];

            const sponsorList = document.getElementById('sponsorList');
            if (sponsors.length > 0) {
                sponsorList.innerHTML = sponsors.map(name => `
                    <div class="sponsor-item">${name}</div>
                `).join('');
            }
        })();
    </script>
</body>
</html>
